        input[type=checkbox].icocheck+label:before {
            display: inline;
            font-family: "iconfont";
            font-size: 1em;
            font-style: normal;
            font-weight: normal;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale
        }

        .modal-editAction .dropdown-menu input[type=checkbox]+label:before,
        .modal-editAction .dropdown-menu input[type=radio]+label:before {
            font-size: 1.1rem;
            color: #9cacb1;
            margin-right: 11px;
            position: relative;
            top: 2px
        }

        input[type=checkbox]+label:before,
        input[type=radio]+label:before {
            content: ""
        }

        input[type=checkbox]+label:before,
        input[type=radio]+label:before {
            box-sizing: border-box;
            background: #fafcfc;
            display: block;
            overflow: hidden;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-indent: 20px;
            margin-top: -10px;
            position: absolute;
            left: 0;
            top: 50%;
            border: 1px solid #d6dcde;
            border-radius: 3px;
            text-align: center;
            font-size: 21px;
            font-size: 1.3125rem;
            color: #5a6b6f;
            transition: 0.3s ease
        }

        .form-group--gray input[type=checkbox]+label:before,
        .form-group--gray input[type=radio]+label:before {
            background: #f9f9f9
        }

        input[type=checkbox]:hover+label:before,
        input[type=radio]:hover+label:before {
            border-color: #81949a
        }

        input[type=checkbox]:checked+label:before,
        input[type=radio]:checked+label:before,
        input[type=checkbox].checked:before,
        input[type=radio].checked:before {
            text-indent: -1px
        }

        input[type=checkbox]:disabled+label,
        input[type=radio]:disabled+label {
            opacity: 0.5
        }

        input[type=checkbox]:checked:disabled+label:before,
        input[type=radio]:checked:disabled+label:before {
            border: none;
            background: #f9f9f9;
            opacity: 0.5
